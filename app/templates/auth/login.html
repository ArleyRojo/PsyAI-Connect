<!DOCTYPE html>
<html lang="es" class="{{ 'dark-mode' if request.cookies.get('theme') == 'dark' else '' }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PsyAI Connect | Inicio de sesión</title>
    <link rel="icon" type="image/jpeg" href="/img/Logo.jpg" sizes="any">
    <script src="/js/core/shared/theme-inline.js"></script>
<link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link rel="stylesheet" href="/css/pages/auth.css">
<link rel="stylesheet" href="/responsive/auth.css">
<link rel="stylesheet" href="/css/themes/theme.css">

<script src="/js/core/shared/theme.js"></script>
<script src="/js/core/shared/localStorage-detector.js"></script>
</head>

<body>

<!-- Canvas para animación de fondo -->
<canvas id="bgCanvas" class="canvas-bg"></canvas>

<!-- Enlace Volver al Inicio -->
<div class="back-index">
    <a href="/index.html">&larr; Volver al Inicio</a>
</div>



<!-- Login Card -->
<div class="d-flex justify-content-center align-items-center vh-100">
    <div class="login-card">
        <!-- Logo + título -->
        <div class="login-header">
            <img src="/img/Logo.jpg" alt="Logo" loading="lazy" width="76" height="76">
            <h1>Iniciar Sesión</h1>
        </div>

        <form>
            <!-- Email -->
            <div class="mb-3">
                <label for="email" class="form-label">Correo electrónico</label>
                <input type="email" class="form-control" id="email" placeholder="usuario@example.com" aria-describedby="emailHelp" autocomplete="email">
                <small id="emailHelp" class="form-text text-muted"></small>
            </div>

            <!-- Contraseña -->
            <div class="mb-3">
                <label for="password" class="form-label">Contraseña</label>
                <div style="position:relative;">
                    <input type="password" class="form-control" id="password" placeholder="Contraseña" autocomplete="current-password" required>
                    <button type="button" class="password-toggle" onclick="togglePassword('password', this)" tabindex="-1" aria-label="Mostrar u ocultar contraseña">
                        <i class="fas fa-eye" aria-hidden="true"></i>
                    </button>
                </div>
            </div>

            <!-- Selector de rol -->
            <div class="role-selection" role="group" aria-label="Seleccionar rol de usuario">
                <div class="role-btn active" data-role="paciente" role="button" tabindex="0" aria-pressed="true">
                    <i class="fas fa-user" aria-hidden="true"></i>
                    <span>Paciente</span>
                </div>
                <div class="role-btn" data-role="profesional" role="button" tabindex="0" aria-pressed="false">
                    <i class="fas fa-stethoscope" aria-hidden="true"></i>
                    <span>Profesional</span>
                </div>
                <div class="role-btn" data-role="admin" role="button" tabindex="0" aria-pressed="false">
                    <i class="fas fa-shield-alt" aria-hidden="true"></i>
                    <span>Admin</span>
                </div>
            </div>

            <div class="d-grid mb-3">
                <button type="submit" class="btn btn-primary" aria-describedby="submitHelp">
                    <span class="btn-text">Entrar</span>
                </button>
                <small id="submitHelp" class="form-text text-muted d-none">Presione Entrar o haga clic en el botón para iniciar sesión</small>
            </div>

            <div class="text-center">
                 <a href="recover.html" class="text-decoration-none link-action">¿Olvidaste tu contraseña?</a>
            </div>
            <div class="text-center">
                <a href="register.html" class="text-decoration-none link-action">¿No tienes cuenta? Registrarse</a>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/css/components/custom-alerts.css">
    <script src="/js/core/shared/alerts.js"></script>
    <script src="/js/modules/auth/auth-ui.js"></script>
    <script src="/js/modules/auth/register.js"></script>
    <script src="/js/modules/auth/login.js"></script>
</body>
</html>
