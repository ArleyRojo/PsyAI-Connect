<!DOCTYPE html>
<html lang="es" class="{{ 'dark-mode' if request.cookies.get('theme') == 'dark' else '' }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Lora:wght@600;700&display=swap" rel="stylesheet">
<title>PsyAI Connect | Recuperar contrasena</title>
    <link rel="icon" type="image/jpeg" href="/img/Logo.jpg" sizes="any">
    <script src="/js/core/shared/theme-inline.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<link rel="stylesheet" href="/css/pages/auth.css">
<link rel="stylesheet" href="/responsive/auth.css">
<link rel="stylesheet" href="/css/themes/theme.css">
    
<script src="/js/core/shared/theme.js"></script>
<script src="/js/core/shared/localStorage-detector.js"></script>
</head>
<body>
    <canvas id="bgCanvas" class="canvas-bg"></canvas>

     <div class="back-index">
         <a href="../base/index.html">&larr; Volver al Inicio</a>
     </div>



     <div class="d-flex justify-content-center align-items-center vh-100">
        <div class="login-card recover-card">
            <div class="login-header">
                <img src="/img/Logo.jpg" alt="Logo">
                <h1>Recuperar cuenta</h1>
            </div>

            <div class="text-center mb-4">
                <div class="mb-3">
                    <i class="fas fa-envelope-open-text recover-icon"></i>
                </div>
                <p class="mb-0 text-muted">
                     Ingresa tu correo y te enviaremos instrucciones para restablecer tu contraseña.
                </p>
            </div>

            <form class="w-100">
                <div class="mb-3">
                    <label for="email" class="form-label">Correo electronico</label>
                    <input type="email" class="form-control" id="email" placeholder="usuario@example.com">
                </div>

                <div class="d-grid mb-3">
                    <button type="submit" class="btn btn-primary">Enviar enlace</button>
                </div>

                <div class="text-center">
                    <a href="login.html" class="text-decoration-none link-action">Volver a iniciar sesion</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="/css/components/custom-alerts.css">
    <script src="/js/core/shared/alerts.js"></script>
    <script src="/js/modules/auth/auth-ui.js"></script>
    <script src="/js/modules/auth/register.js"></script>
    <script src="/js/modules/auth/recover.js"></script>
</body>
</html>
